### background
background_opacity 0.36
background_blur 1

### general
confirm_os_window_close 0
allow_remote_control yes

### term
term xterm-kitty

### terminal bell
enable_audio_bell no

### display
linux_display_server wayland

### fonts
font_size 16

## firacode config
# font_family family="FiraCode Nerd Font Mono"

## monaspice config
font_family      family='monaspicekr nerd font mono' features='+ss01 +ss02 +ss03 +ss04 +ss05 +ss07 +ss08 +ss09 +ss10'

## general
# bold_font		auto
# italic_font		auto
# bold_italic_font	auto

### mappings
clear_all_shortcuts yes
kitty_mod alt
map ctrl+backspace change_font_size all 0
map ctrl+minus combine : change_font_size all -2.0 : launch --type=overlay --keep-focus sh -c "kitten @ load-config -o font_size=$(kitten query-terminal font_size|grep -o \"[0-9]\\+\")"
map ctrl+equal combine : change_font_size all +2.0 : launch --type=overlay --keep-focus sh -c "kitten @ load-config -o font_size=$(kitten query-terminal font_size|grep -o \"[0-9]\\+\")"
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

### cursor
# could be block underline or beam
cursor_trail 1
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

### scrollbar
scrollbar_radius 0
scrollbar_width 0.5
scrollbar_hover_width 0.5

### mouse
mouse_hide_wait 0

### hyperlinks
url_style single
underline_hyperlinks always

### window layout
# active_border_color #FFFFFF
# inactive_border_color #592720
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 1.5pt
window_padding_width 0
window_margin_width 2
hide_window_decorations yes

### window management 
map kitty_mod+a new_window
map kitty_mod+w next_window
map kitty_mod+b previous_window
map kitty_mod+x close_window
map kitty_mod+shift+h resize_window thinner
map kitty_mod+shift+j resize_window shorter
map kitty_mod+shift+k resize_window taller
map kitty_mod+shift+l resize_window wider

### layout management
enabled_layouts tall,fat,vertical,horizontal,grid
map kitty_mod+m next_layout

### colors
include colors.conf
